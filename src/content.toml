[en.about]
name = "Alex Morozov"
tagline = "Software engineer and researcher working at the intersection of distributed systems, computational geometry, and human-computer interaction."
bio_lead = "I build tools that turn mathematical structures into things you can touch, drag, and feel."
bio = "Currently based in Berlin, I split my time between engineering interactive systems and collaborating on research in geometric algorithms. Previously I worked on rendering pipelines, developer tooling, and a few too many side projects."
location = "Berlin, Germany"

[en.about.spoken_languages]
"English" = "Fluent (C2)"
"French" = "Intermediate (B2)"
"German" = "Basic (A2)"
"Russian" = "Native"

[[en.experience]]
role = "Senior Software Engineer"
company = "Helix Labs"
period = "2022 — present"
description = "Leading development of a real-time collaborative editor with CRDT-based sync. Built the rendering layer, plugin system, and the math-aware input pipeline."

[[en.experience]]
role = "Software Engineer"
company = "Northwind Systems"
period = "2019 — 2022"
description = "Worked on developer tooling for a data analytics platform. Shipped a query profiler and a notebook-style REPL that became the team's daily driver."

[[en.experience]]
role = "Research Assistant"
company = "TU Berlin · Geometry Lab"
period = "2017 — 2019"
description = "Implemented numerical methods for curve-shortening flows. Co-authored two papers on discrete differential geometry."

[en.skills]
languages = ["TypeScript", "Python", "Rust", "Go", "GLSL", "SQL"]
frameworks = ["React", "Three.js", "FastAPI", "Tokio", "Bevy"]
tools = ["PostgreSQL", "Redis", "Docker", "Kubernetes", "Terraform"]
suites = ["Figma", "Blender", "Adobe Suite"]

[[en.projects]]
