# ══════════════════════════════════════
# ABOUT
# ══════════════════════════════════════
[about.en]
name = "Alexander Morozov"
tagline = "Software engineer and researcher working at the intersection of distributed systems, computational geometry, and human-computer interaction."
bio_lead = "I build tools that turn mathematical structures into things you can touch, drag, and feel."
bio = "Currently based in Berlin, I split my time between engineering interactive systems and collaborating on research in geometric algorithms. Previously I worked on rendering pipelines, developer tooling, and a few too many side projects."
location = "Berlin, Germany"

[about.fr]
name = "Alexander Morozov"
tagline = "Ingénieur logiciel et chercheur travaillant à l'intersection des systèmes distribués, de la géométrie computationnelle et de l'interaction homme-machine."
bio_lead = "Je construis des outils qui transforment les structures mathématiques en objets que l'on peut toucher, déplacer et ressentir."
bio = "Actuellement basé à Berlin, je partage mon temps entre l'ingénierie de systèmes interactifs et la recherche en algorithmes géométriques. Auparavant, j'ai travaillé sur des pipelines de rendu, des outils de développement et beaucoup trop de projets parallèles."
location = "Berlin, Allemagne"

[about.ru]
name = "Александр Морозов"
tagline = "Программист и исследователь, работающий на стыке распределенных систем, вычислительной геометрии и человеко-машинного взаимодействия."
bio_lead = "Я создаю инструменты, превращающие математические структуры в нечто, что можно потрогать, двигать и почувствовать."
bio = "В настоящее время живу в Берлине, разделяя свое время между разработкой интерактивных систем и исследованиями в области геометрических алгоритмов. Ранее я работал над конвейерами рендеринга, инструментами разработчика и слишком большим количеством побочных проектов."
location = "Берлин, Германия"

