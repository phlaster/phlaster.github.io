<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Alexander Morozov — Portfolio</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%23B4502A'>urve</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="/src/styles/main.css">
</head>

<body>
  <div class="hero-canvas-wrap no-print" id="canvasWrap">
    <canvas id="heroCanvas"></canvas>
    <iframe id="heroIframe" src="" frameborder="0" allow="fullscreen"></iframe>
  </div>

  <header class="topbar no-print" id="topbar">
    <div class="topbar-inner">
      <div class="brand">A<span class="dot">·</span>M</div>
      <nav class="nav-links" id="navLinks" role="navigation">
        <a href="#about" class="nav-link active" data-nav="about">About</a>
        <a href="#career" class="nav-link" data-nav="career">Career & Skills</a>
        <a href="#projects" class="nav-link" data-nav="projects">Projects</a>
        <a href="#research" class="nav-link" data-nav="research">Research</a>
        <a href="#documents" class="nav-link" data-nav="documents">Documents</a>
        <a href="#contact" class="nav-link" data-nav="contact">Write me</a>
      </nav>
      <div class="topbar-actions">
        <button class="btn-action btn-pdf" id="exportPdfBtn" aria-label="Export to PDF">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          <span>PDF</span>
        </button>
        <div class="lang-switch" id="langSwitch">
          <button class="lang-trigger" id="langTrigger" aria-haspopup="true" aria-expanded="false" aria-label="Change language">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="2" y1="12" x2="22" y2="12"></line>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
            </svg>
            <span class="lang-current" id="langCurrent">EN</span>
          </button>
          <ul class="lang-dropdown" id="langDropdown" role="menu">
            <li role="menuitem" data-lang="en" class="active">English</li>
            <li role="menuitem" data-lang="ru">Русский</li>
            <li role="menuitem" data-lang="fr">Français</li>
          </ul>
        </div>
      </div>
    </div>
  </header>

  <section class="hero" id="hero">
    <div id="printBackground" class="print-only"></div>

    <div class="hero-overlay" id="heroOverlay">
      <div class="hero-top"></div>

      <div class="hero-content">
        <div class="hero-text-block">
          <h1 class="hero-name" id="heroName">—</h1>
          <p class="hero-tagline" id="heroTagline"></p>
          <div class="hero-socials" id="heroSocials"></div>
        </div>
        <img class="hero-photo" id="heroPhoto" src="" alt="">
      </div>

      <div class="hero-foot">
        <button class="scroll-cue no-print" id="scrollCue" type="button">
          <span id="scrollCueText">Scroll to explore</span>
          <span class="arrow">↓</span>
        </button>
      </div>
    </div>
  </section>

  <main class="content-area" id="contentArea">

    <section id="about" class="content-section">
      <div class="panel-head">
        <h2 class="panel-title" id="about-title"></h2>
        <span class="panel-subtitle" id="about-sub"></span>
      </div>
      <div id="about-content"></div>
    </section>

    <section id="career" class="content-section">
      <div class="panel-head">
        <h2 class="panel-title" id="career-title"></h2>
        <span class="panel-subtitle" id="career-sub"></span>
      </div>
      <div id="career-content"></div>
    </section>

    <section id="projects" class="content-section">
      <div class="panel-head">
        <h2 class="panel-title" id="proj-title"></h2>
        <span class="panel-subtitle" id="proj-sub"></span>
      </div>
      <div id="projects-content"></div>
    </section>

    <section id="research" class="content-section">
      <div class="panel-head">
        <h2 class="panel-title" id="research-title"></h2>
        <span class="panel-subtitle" id="research-sub"></span>
      </div>
      <div id="research-content"></div>
    </section>

    <section id="documents" class="content-section">
      <div class="panel-head">
        <h2 class="panel-title" id="docs-title"></h2>
        <span class="panel-subtitle" id="docs-sub"></span>
      </div>
      <div id="documents-content"></div>
    </section>

  </main>

  <footer class="site-footer" id="contact">
    <div class="footer-inner">
      <h2 id="contactTitle">Let's <em>talk</em>.</h2>
      <div class="contact-grid">
        <div class="contact-intro">
          <p id="contactIntro"></p>
          <p id="printContactText" class="print-only"></p>
          <img id="contactPhoto" src="" alt="Portrait" class="contact-photo">
          <div class="contact-channels">
            <div class="contact-channel" id="channelTelegramWrap">
              <span class="label">Telegram</span>
              <span class="value reveal-loader"><span class="btn-spinner"></span></span>
            </div>
            <div class="contact-channel" id="channelEmailWrap">
              <span class="label">Email</span>
              <span class="value reveal-loader"><span class="btn-spinner"></span></span>
            </div>
          </div>
        </div>
        <form class="contact-form" id="contactForm" novalidate>
          <div class="form-row">
            <div class="field">
              <label for="f-name" id="lbl-name">Name</label>
              <input id="f-name" name="name" type="text" maxlength="30">
            </div>
            <div class="field">
              <label for="f-email" id="lbl-email">Email</label>
              <input id="f-email" name="email" type="text" maxlength="30">
            </div>
          </div>
          <div class="field">
            <label for="f-subject" id="lbl-subject">Subject</label>
            <input id="f-subject" name="subject" type="text" maxlength="60">
          </div>
          <div class="field textarea-wrapper">
            <label for="f-message" id="lbl-message">Message</label>
            <textarea id="f-message" name="message" rows="5" required maxlength="2000"></textarea>
            <span id="charCounter" class="char-counter">0/2000</span>
          </div>
          <div class="submit-row">
            <button class="submit-btn" type="submit" id="submitBtn">Send message</button>
            <span class="form-status" id="formStatus"></span>
          </div>
        </form>
      </div>

      <div class="footer-bottom">
        <span>© <span id="footerYear">2026</span> <span id="footerAuthor">Alexander Morozov</span></span>
        <span class="no-print">Static · <a href="#" id="ghPagesLink" target="_blank" rel="noopener">GitHub Pages</a><span id="deployDateText"></span></span>
        <span class="print-only" id="pdfFooterInfo"></span>
      </div>
    </div>
  </footer>

  <div id="pdfModal" class="pdf-modal no-print">
    <div class="pdf-modal-content">
      <button id="closePdfModal" class="pdf-modal-close" aria-label="Close PDF viewer">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
      <div class="pdf-viewer-wrapper" id="pdf-viewer-wrapper">
        <iframe id="pdfFrame" class="pdf-iframe" src=""></iframe>
      </div>
    </div>
  </div>

  <script type="module" src="/src/scripts/main.js"></script>
</body>
