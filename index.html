<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Alex Morozov — Portfolio</title>

<!-- Inline favicon to prevent 404 requests -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%23B4502A'>urve</text></svg>">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="/src/style.css">
</head>
<body>

<header class="topbar" id="topbar">
  <div class="topbar-inner">
    <div class="brand">A<span class="dot">·</span>M</div>
    <nav class="tabs" id="tabs" role="tablist">
      <button class="tab active" data-tab="about" role="tab">About</button>
      <button class="tab" data-tab="skills" role="tab">Skills</button>
      <button class="tab" data-tab="experience" role="tab">Experience</button>
      <button class="tab" data-tab="projects" role="tab">Projects</button>
      <button class="tab" data-tab="publications" role="tab">Publications</button>
      <button class="tab" data-tab="posts" role="tab">Posts</button>
    </nav>
    <div class="lang-switch" id="langSwitch" role="group" aria-label="Language">
      <button data-lang="en" class="active"><span>EN</span></button>
      <button data-lang="fr"><span>FR</span></button>
    </div>
  </div>
</header>

<section class="hero" id="hero">
  <div class="hero-canvas-wrap" id="canvasWrap">
    <canvas id="heroCanvas"></canvas>
    <iframe id="heroIframe" src="" frameborder="0" allow="fullscreen" title="Interactive curve canvas"></iframe>
  </div>
  <div class="hero-overlay" id="heroOverlay">
    <div class="hero-top">
      <span id="heroLabelTop">Portfolio · 2024</span>
      <span id="heroLocation">—</span>
    </div>
    
    <div class="hero-bottom-block">
      <!-- Photo moved here, outside hero-content -->
      <img class="hero-photo" id="heroPhoto" src="" alt="">
      
      <div class="hero-content">
        <div class="hero-text-block">
          <h1 class="hero-name" id="heroName">—</h1>
          <p class="hero-tagline" id="heroTagline"></p>
        </div>
      </div>
      
      <div class="hero-foot">
        <button class="scroll-cue" id="scrollCue" type="button">
          <span id="scrollCueText">Scroll to explore</span>
          <span class="arrow">↓</span>
        </button>
        <span class="hero-interact-hint" id="heroInteractHint">Drag to draw · tap & drag on touch</span>
      </div>
    </div>
  </div>
</section>

<main class="content-area" id="contentArea">
  <section class="panel active" data-panel="about" id="panel-about"></section>
  <section class="panel" data-panel="skills" id="panel-skills"></section>
  <section class="panel" data-panel="experience" id="panel-experience"></section>
  <section class="panel" data-panel="projects" id="panel-projects"></section>
  <section class="panel" data-panel="publications" id="panel-publications"></section>
  <section class="panel" data-panel="posts" id="panel-posts"></section>
</main>

<section class="contact-section" id="contact">
  <div class="contact-inner">
    <div class="contact-intro">
      <h2 id="contactTitle">Let's <em>talk</em>.</h2>
      <p id="contactIntro"></p>
      <div class="contact-channels">
        <a class="contact-channel" href="#" id="channelGithub">
          <span class="label">GitHub</span>
          <span class="value">—</span>
        </a>
        <a class="contact-channel" href="#" id="channelTelegram">
          <span class="label">Telegram</span>
          <span class="value">—</span>
        </a>
        <a class="contact-channel" href="#" id="channelEmail">
          <span class="label">Email</span>
          <span class="value">—</span>
        </a>
      </div>
    </div>
    <form class="contact-form" id="contactForm" novalidate>
      <div class="form-row">
        <div class="field">
          <label for="f-name" id="lbl-name">Name</label>
          <input id="f-name" name="name" type="text" required>
        </div>
        <div class="field">
          <label for="f-email" id="lbl-email">Email</label>
          <input id="f-email" name="email" type="email" required>
        </div>
      </div>
      <div class="field">
        <label for="f-subject" id="lbl-subject">Subject</label>
        <input id="f-subject" name="subject" type="text">
      </div>
      <div class="field">
        <label for="f-message" id="lbl-message">Message</label>
        <textarea id="f-message" name="message" rows="5" required></textarea>
      </div>
      <div class="submit-row">
        <button class="submit-btn" type="submit" id="submitBtn">Send message</button>
        <span class="form-status" id="formStatus"></span>
      </div>
    </form>
  </div>
</section>

<footer class="site-footer">
  <div class="footer-inner">
    <span>© <span id="footerYear">2024</span> <span id="footerAuthor">Alex Morozov</span></span>
    <span>Static · GitHub Pages</span>
  </div>
</footer>

<script type="module" src="/src/main.js"></script>
</body>
</html>
