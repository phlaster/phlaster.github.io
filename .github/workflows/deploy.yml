name: Deploy to GitHub Pages
on:
  push:
    branches: "master"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Prepare Deploy Info
        run: |
          DEPLOY_DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          echo "VITE_DEPLOY_DATE=${DEPLOY_DATE}" >> $GITHUB_ENV
          echo "VITE_REPO_URL=https://github.com/${GITHUB_REPOSITORY}" >> $GITHUB_ENV
          
      - name: Build
        env:
          VITE_DEPLOY_DATE: ${{ env.VITE_DEPLOY_DATE }}
          VITE_REPO_URL: ${{ env.VITE_REPO_URL }}
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Remove existing artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: github-pages
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
          
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4